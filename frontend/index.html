<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Electricity Prices</title>
  <!--
    Tailwind CSS v4.3.0 @tailwindcss/browser runtime, vendored locally for learning and prototyping.
    Production deployments should swap this in-browser runtime for a Tailwind CLI build
    (see https://tailwindcss.com/docs/installation).
  -->
  <script src="vendor/tailwind.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans">
  <main class="max-w-2xl mx-auto p-8 space-y-6">
    <h1 class="text-3xl font-bold">Electricity Prices</h1>

    <section class="rounded-lg border border-slate-200 bg-white p-4 space-y-3">
      <div class="flex items-center gap-3">
        <label for="zone" class="font-medium">Zone:</label>
        <select id="zone" class="rounded border border-slate-300 px-2 py-1">
          <option value="NO1">NO1</option>
          <option value="NO2">NO2</option>
          <option value="NO3">NO3</option>
          <option value="NO4">NO4</option>
          <option value="NO5">NO5</option>
        </select>
        <span id="date-label" class="text-slate-600"></span>
        <span id="loading" class="text-slate-500" hidden>Loading…</span>
      </div>

      <table class="w-full text-sm">
        <thead>
          <tr class="text-left border-b">
            <th class="py-1">Time</th>
            <th class="py-1 text-right">Spot</th>
            <th class="py-1 text-right">VAT</th>
            <th class="py-1 text-right">Tariff</th>
            <th class="py-1 text-right">Total (øre/kWh)</th>
          </tr>
        </thead>
        <tbody id="hours-body"></tbody>
      </table>
    </section>

    <div id="error" role="alert"
         class="rounded-lg border border-red-300 bg-red-50 text-red-800 p-4" hidden></div>
  </main>
</body>
</html>
